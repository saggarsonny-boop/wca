<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sponsorship Admin — White Collar Academy</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/organiser.css">
  <style>
    .admin-container { max-width: 900px; margin: 0 auto; padding: 2rem 1.25rem; }
    .stat-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .stat-box { flex: 1; min-width: 120px; border: 1px solid var(--border); border-radius: 6px; padding: 1rem; background: #fff; }
    .stat-box strong { display: block; font-size: 1.4rem; font-family: var(--font-serif); }
    .sponsorship-card { border: 1px solid var(--border); border-radius: 6px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; background: #fff; }
    .status-badge { display: inline-block; padding: 0.15rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-paid { background: #d4edda; color: #155724; }
    .status-fulfilled { background: #d1ecf1; color: #0c5460; }
    .status-cancelled { background: #f8d7da; color: #721c24; }
    .add-facility-form { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
    .add-facility-form input, .add-facility-form select { padding: 0.5rem; border: 1px solid var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="/" class="site-logo"><svg width="28" height="28" viewBox="0 0 64 64" style="vertical-align:middle;margin-right:0.4rem;border-radius:5px;" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="64" rx="8" fill="#2c4a7c"/><text x="32" y="44" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="1">WCA</text></svg>White Collar Academy</a>
  </div>
</header>

<div id="app"></div>

<script>
(function () {
  const app = document.getElementById("app");

  function renderLogin(errorMsg) {
    app.innerHTML = `
      <div class="auth-wrap">
        <div class="auth-box">
          <h1>Sponsorship Admin</h1>
          <p class="auth-sub">This is a private admin panel, not part of the organiser.</p>
          <form id="admin-login-form">
            <div class="field">
              <label for="password">Admin password</label>
              <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-full">Sign in</button>
            <div class="auth-status ${errorMsg ? "auth-status--err" : ""}">${errorMsg || ""}</div>
          </form>
        </div>
      </div>
    `;
    document.getElementById("admin-login-form").addEventListener("submit", async function (e) {
      e.preventDefault();
      const password = document.getElementById("password").value;
      const r = await fetch("/api/sponsor/admin-login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password })
      });
      if (r.ok) {
        renderDashboard();
      } else {
        const data = await r.json().catch(() => ({}));
        renderLogin(data.error || "Sign in failed.");
      }
    });
  }

  function escHtml(s) {
    return (s || "").toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  async function loadFacilityRequests() {
    const list = document.getElementById("requests-list");
    const r = await fetch("/api/sponsor/admin-requests");
    if (r.status === 401) { renderLogin(); return; }
    const data = await r.json();

    if (!data.requests || !data.requests.length) {
      list.innerHTML = `<p class="text-soft">No pending facility requests.</p>`;
      return;
    }

    list.innerHTML = data.requests.map(req => `
      <div class="sponsorship-card">
        <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:0.5rem;">
          <div><strong>${escHtml(req.facility_name)}</strong> ${req.city ? `— ${escHtml(req.city)}, ${escHtml(req.state || "")}` : ""}</div>
          <span class="status-badge status-pending">pending</span>
        </div>
        <div class="text-soft" style="font-size:0.85rem; margin-top:0.4rem;">
          ${escHtml(req.address || "")}
          ${req.requestor_name ? ` · Requested by ${escHtml(req.requestor_name)}` : ""}
          ${req.requestor_email ? ` (${escHtml(req.requestor_email)})` : ""}
        </div>
        ${req.notes ? `<div class="text-soft" style="margin-top:0.4rem; font-style:italic;">"${escHtml(req.notes)}"</div>` : ""}
        <div style="margin-top:0.6rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
          <button class="btn req-approve" data-id="${req.id}" style="font-size:0.8rem; padding:0.35rem 0.8rem;">Approve</button>
          <button class="btn btn--outline req-deny" data-id="${req.id}" style="font-size:0.8rem; padding:0.35rem 0.8rem;">Deny</button>
          <button class="btn btn--outline req-duplicate" data-id="${req.id}" style="font-size:0.8rem; padding:0.35rem 0.8rem;">Duplicate</button>
        </div>
      </div>
    `).join("");

    async function actOn(id, action, confirmMsg) {
      if (!confirm(confirmMsg)) return;
      await fetch("/api/sponsor/admin-requests", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ request_id: id, action })
      });
      loadFacilityRequests();
    }

    list.querySelectorAll(".req-approve").forEach(btn =>
      btn.addEventListener("click", () => actOn(btn.dataset.id, "approve", "Approve this facility and add it to the list?")));
    list.querySelectorAll(".req-deny").forEach(btn =>
      btn.addEventListener("click", () => actOn(btn.dataset.id, "deny", "Deny this request?")));
    list.querySelectorAll(".req-duplicate").forEach(btn =>
      btn.addEventListener("click", () => actOn(btn.dataset.id, "duplicate", "Mark this as a duplicate?")));
  }

  async function renderDashboard() {
    const r = await fetch("/api/sponsor/admin");
    if (r.status === 401) { renderLogin(); return; }
    const data = await r.json();

    const stats = data.stats || {};
    let html = `
      <div class="admin-container">
        <h1 style="font-size:1.5rem;">Sponsorship Admin</h1>

        <div class="stat-row">
          <div class="stat-box"><strong>${stats.total || 0}</strong>Total</div>
          <div class="stat-box"><strong>${stats.pending || 0}</strong>Pending</div>
          <div class="stat-box"><strong>${stats.paid || 0}</strong>Paid</div>
          <div class="stat-box"><strong>${stats.fulfilled || 0}</strong>Fulfilled</div>
        </div>

        <h2 style="font-size:1.1rem;">Sponsorships</h2>
        <div id="sponsorships-list">
    `;

    if (!data.sponsorships || !data.sponsorships.length) {
      html += `<p class="text-soft">No sponsorships yet.</p>`;
    } else {
      data.sponsorships.forEach(s => {
        html += `
          <div class="sponsorship-card">
            <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:0.5rem;">
              <div>
                <strong>${escHtml(s.sponsor_name)}</strong> ${s.is_anonymous ? "🔒 anonymous" : `— ${escHtml(s.sponsor_email)}`}
              </div>
              <span class="status-badge status-${s.status}">${s.status}</span>
            </div>
            <div class="text-soft" style="font-size:0.85rem; margin-top:0.4rem;">
              ${escHtml(s.facility_name || "Unknown facility")} · $${(s.amount_cents / 100).toFixed(2)} · ${s.book_count} book${s.book_count > 1 ? "s" : ""} · ${new Date(s.created_at).toLocaleDateString()}
            </div>
            ${s.message ? `<div class="text-soft" style="margin-top:0.4rem; font-style:italic;">"${escHtml(s.message)}"</div>` : ""}
            ${s.status === "paid" ? `<button class="btn btn--outline mark-fulfilled" data-id="${s.id}" style="margin-top:0.6rem; font-size:0.8rem; padding:0.35rem 0.8rem;">Mark fulfilled</button>` : ""}
          </div>
        `;
      });
    }

    html += `
        </div>

        <h2 style="font-size:1.1rem; margin-top:2rem;">Facility requests</h2>
        <div id="requests-list"><p class="text-soft">Loading…</p></div>

        <h2 style="font-size:1.1rem; margin-top:2rem;">Add a facility</h2>
        <form id="add-facility-form" class="add-facility-form">
          <input type="text" name="name" placeholder="Facility name" required>
          <select name="type" required>
            <option value="camp">Camp</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="administrative">Administrative</option>
          </select>
          <input type="text" name="address" placeholder="Address">
          <input type="text" name="city" placeholder="City">
          <input type="text" name="state" placeholder="State" maxlength="2" required style="width:4rem;">
          <input type="text" name="zip" placeholder="ZIP">
          <button type="submit" class="btn">Add</button>
        </form>
        <div id="add-facility-status" class="text-soft" style="margin-top:0.5rem; font-size:0.85rem;"></div>

        <p style="margin-top:2rem;"><button id="admin-logout" class="btn btn--outline">Sign out</button></p>
      </div>
    `;

    app.innerHTML = html;
    loadFacilityRequests();

    document.querySelectorAll(".mark-fulfilled").forEach(btn => {
      btn.addEventListener("click", async function () {
        if (!confirm("Mark this sponsorship as fulfilled?")) return;
        await fetch("/api/sponsor/admin", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: btn.dataset.id, action: "fulfill" })
        });
        renderDashboard();
      });
    });

    document.getElementById("add-facility-form").addEventListener("submit", async function (e) {
      e.preventDefault();
      const status = document.getElementById("add-facility-status");
      const fd = new FormData(e.target);
      const body = Object.fromEntries(fd.entries());
      body.security_level = body.type;
      const r = await fetch("/api/sponsor/facilities", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if (r.ok) {
        status.textContent = "Facility added.";
        e.target.reset();
      } else {
        const d = await r.json().catch(() => ({}));
        status.textContent = d.error || "Could not add facility.";
      }
    });

    document.getElementById("admin-logout").addEventListener("click", async function () {
      await fetch("/api/sponsor/admin-logout", { method: "POST" });
      renderLogin();
    });
  }

  renderDashboard();
})();
</script>

</body>
</html>
