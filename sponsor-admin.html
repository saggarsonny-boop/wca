<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sponsorship Admin — White Collar Academy</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e5e5e5;
    }

    .admin-header h1 {
      font-family: Georgia, serif;
      font-size: 28px;
      font-weight: 400;
      color: #1a1a2e;
      margin: 0;
    }

    .admin-header .logout-btn {
      font-size: 14px;
      color: #666;
      text-decoration: underline;
      cursor: pointer;
      background: none;
      border: none;
    }

    .admin-header .logout-btn:hover {
      color: #b91c1c;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-box {
      background: #f8f8f8;
      padding: 16px 20px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid #e5e5e5;
    }

    .stat-box .number {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      font-family: Georgia, serif;
    }

    .stat-box .label {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    .admin-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 1px solid #e5e5e5;
    }

    .admin-tabs button {
      background: none;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-family: Georgia, serif;
      color: #666;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .admin-tabs button:hover {
      color: #1a1a2e;
    }

    .admin-tabs button.active {
      color: #1a1a2e;
      border-bottom-color: #1a1a2e;
    }

    .search-box {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      font-family: Georgia, serif;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      margin-bottom: 20px;
      background: #fff;
      color: #1a1a2e;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }

    .search-box:focus {
      outline: none;
      border-color: #1a1a2e;
    }

    .sponsorship-card {
      background: #fff;
      padding: 16px 20px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #e5e5e5;
      transition: box-shadow 0.2s;
    }

    .sponsorship-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .sponsorship-card .card-row {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      align-items: start;
      gap: 8px;
    }

    .sponsorship-card .card-name {
      font-weight: 600;
      color: #1a1a2e;
      font-family: Georgia, serif;
    }

    .sponsorship-card .card-email {
      color: #666;
      font-size: 14px;
      margin-left: 8px;
    }

    .sponsorship-card .card-details {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 8px;
      font-size: 14px;
      color: #666;
    }

    .sponsorship-card .card-message {
      margin-top: 8px;
      font-style: italic;
      color: #888;
      font-size: 14px;
    }

    .sponsorship-card .card-actions {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .status-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: capitalize;
    }

    .status-badge.pending { background: #fef3c7; color: #92400e; }
    .status-badge.paid { background: #d1fae5; color: #065f46; }
    .status-badge.fulfilled { background: #dbeafe; color: #1e40af; }
    .status-badge.shipped { background: #f3e8ff; color: #6b21a8; }
    .status-badge.delivered { background: #d1fae5; color: #065f46; }
    .status-badge.cancelled { background: #fee2e2; color: #991b1b; }
    .status-badge.approved { background: #d1fae5; color: #065f46; }
    .status-badge.denied { background: #fee2e2; color: #991b1b; }
    .status-badge.duplicate { background: #f3f4f6; color: #4b5563; }

    .action-btn {
      padding: 6px 14px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-family: Georgia, serif;
      transition: opacity 0.2s;
    }

    .action-btn:hover { opacity: 0.8; }
    .action-btn.approve { background: #065f46; color: #fff; }
    .action-btn.deny { background: #991b1b; color: #fff; }
    .action-btn.duplicate { background: #6b7280; color: #fff; }
    .action-btn.fulfill { background: #1e40af; color: #fff; }

    .shipping-label-card {
      margin-top: 12px;
      padding: 12px 16px;
      background: #fafafa;
      border: 1px dashed #d0d0d0;
      border-radius: 6px;
      font-family: monospace;
      font-size: 13px;
      color: #333;
      line-height: 1.4;
    }

    .tracking-input-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .tracking-input {
      padding: 6px 12px;
      font-size: 14px;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      min-width: 200px;
      font-family: inherit;
    }

    .notes-input {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      margin-top: 8px;
      box-sizing: border-box;
      font-family: inherit;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
      font-family: Georgia, serif;
    }

    .login-container {
      max-width: 400px;
      margin: 80px auto;
      padding: 40px;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e5e5;
      text-align: center;
    }

    .login-container h1 {
      font-family: Georgia, serif;
      font-size: 24px;
      font-weight: 400;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .login-container p {
      color: #666;
      margin-bottom: 24px;
    }

    .login-container input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-family: Georgia, serif;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }

    .login-container input:focus {
      outline: none;
      border-color: #1a1a2e;
    }

    .login-container .btn {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-family: Georgia, serif;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .login-container .btn:hover {
      background: #2a2a3e;
    }

    .login-container .error {
      color: #991b1b;
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="app">
  <!-- Rendered by JavaScript -->
</div>

<script>
function escHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

let currentTab = 'sponsorships';
let allSponsorships = [];
let allRequests = [];
let cachedStats = {};

async function checkAuthAndLoad() {
  try {
    const res = await fetch('/api/sponsor/admin');

    if (res.status === 401) {
      renderLogin();
      return;
    }

    const data = await res.json();

    if (data.error === 'Unauthorized' || data.error === 'No session') {
      renderLogin();
      return;
    }

    allSponsorships = data.sponsorships || [];
    cachedStats = data.stats || {};

    try {
      const reqRes = await fetch('/api/sponsor/admin-requests');
      if (reqRes.ok) {
        const reqData = await reqRes.json();
        allRequests = reqData.requests || [];
      } else {
        allRequests = [];
      }
    } catch(e) {
      allRequests = [];
    }

    renderDashboard();

  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="admin-container">
        <p style="color:#991b1b;">Failed to load dashboard. Please refresh.</p>
      </div>
    `;
  }
}

function renderLogin() {
  document.getElementById('app').innerHTML = `
    <div class="login-container">
      <h1>🔐 Admin Login</h1>
      <p>Enter the admin password to continue</p>
      <input type="password" id="admin-password" placeholder="Enter password"
             onkeydown="if(event.key==='Enter') login()">
      <button class="btn" onclick="login()">Login</button>
      <div id="login-error" class="error"></div>
    </div>
  `;
}

async function login() {
  const password = document.getElementById('admin-password').value;
  const errorEl = document.getElementById('login-error');

  try {
    const res = await fetch('/api/sponsor/admin-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });

    if (res.ok) {
      checkAuthAndLoad();
    } else {
      const data = await res.json();
      errorEl.textContent = data.error || 'Invalid password';
    }
  } catch(e) {
    errorEl.textContent = 'Login failed. Please try again.';
  }
}

async function logout() {
  if (!confirm('Log out?')) return;
  try {
    await fetch('/api/sponsor/admin-logout', { method: 'POST' });
  } catch(e) {
    // Ignore errors - just render login anyway
  }
  renderLogin();
}

function renderDashboard() {
  const stats = cachedStats;
  const total = stats.total || 0;
  const pending = stats.pending || 0;
  const paid = stats.paid || 0;
  const fulfilled = stats.fulfilled || 0;
  const shipped = stats.shipped || 0;
  const delivered = stats.delivered || 0;
  const requestsPending = allRequests.filter(r => r.status === 'pending').length;

  const filteredSponsorships = filterSponsorships(allSponsorships);
  const filteredRequests = filterRequests(allRequests);

  document.getElementById('app').innerHTML = `
    <div class="admin-container">
      <div class="admin-header">
        <h1>📚 Sponsorship Admin</h1>
        <button class="logout-btn" onclick="logout()">Log out</button>
      </div>

      <div class="stats-grid">
        <div class="stat-box"><div class="number">${total}</div><div class="label">Total</div></div>
        <div class="stat-box"><div class="number">${pending}</div><div class="label">Pending</div></div>
        <div class="stat-box"><div class="number">${paid}</div><div class="label">Paid</div></div>
        <div class="stat-box"><div class="number">${fulfilled}</div><div class="label">Fulfilled</div></div>
        <div class="stat-box"><div class="number">${shipped}</div><div class="label">Shipped</div></div>
        <div class="stat-box"><div class="number">${delivered}</div><div class="label">Delivered</div></div>
        <div class="stat-box"><div class="number">${requestsPending}</div><div class="label">Requests</div></div>
      </div>

      <div class="admin-tabs">
        <button class="${currentTab === 'sponsorships' ? 'active' : ''}" onclick="switchTab('sponsorships')">Sponsorships</button>
        <button class="${currentTab === 'requests' ? 'active' : ''}" onclick="switchTab('requests')">Facility Requests</button>
      </div>

      ${currentTab === 'sponsorships'
        ? renderSponsorshipsList(filteredSponsorships)
        : renderRequestsList(filteredRequests)}
    </div>
  `;
}

function filterSponsorships(list) {
  const searchEl = document.getElementById('search-box');
  const statusEl = document.getElementById('status-filter');
  let filtered = list;

  if (statusEl && statusEl.value) {
    const val = statusEl.value;
    filtered = filtered.filter(s => s.status === val);
  }

  if (searchEl) {
    const query = searchEl.value.toLowerCase().trim();
    if (query) {
      filtered = filtered.filter(s => {
        const name = (s.sponsor_name || '').toLowerCase();
        const email = (s.sponsor_email || '').toLowerCase();
        const facility = (s.facility_name || '').toLowerCase();
        return name.includes(query) || email.includes(query) || facility.includes(query);
      });
    }
  }

  return filtered;
}

function filterRequests(list) {
  const searchEl = document.getElementById('search-requests');
  if (!searchEl) return list;
  const query = searchEl.value.toLowerCase().trim();
  if (!query) return list;

  return list.filter(r => {
    const name = (r.facility_name || '').toLowerCase();
    const email = (r.requestor_email || '').toLowerCase();
    return name.includes(query) || email.includes(query);
  });
}

function renderSponsorshipsList(list) {
  const searchVal = document.getElementById('search-box') ? document.getElementById('search-box').value : '';
  const filterVal = document.getElementById('status-filter') ? document.getElementById('status-filter').value : '';

  let html = `
    <div style="display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;">
      <input class="search-box" id="search-box" style="margin-bottom: 0; flex: 1;" placeholder="Search by name, email, or facility..." value="${escHtml(searchVal)}" oninput="refreshCurrentTab()">
      <select id="status-filter" style="padding: 12px 16px; font-size: 16px; border: 1px solid #d0d0d0; border-radius: 6px; font-family: Georgia, serif; background: #fff;" onchange="refreshCurrentTab()">
        <option value="" ${filterVal === '' ? 'selected' : ''}>All Statuses</option>
        <option value="pending" ${filterVal === 'pending' ? 'selected' : ''}>Pending</option>
        <option value="paid" ${filterVal === 'paid' ? 'selected' : ''}>Paid</option>
        <option value="fulfilled" ${filterVal === 'fulfilled' ? 'selected' : ''}>Fulfilled</option>
        <option value="shipped" ${filterVal === 'shipped' ? 'selected' : ''}>Shipped</option>
        <option value="delivered" ${filterVal === 'delivered' ? 'selected' : ''}>Delivered</option>
      </select>
    </div>
  `;

  if (!list.length) {
    return html + `<div class="empty-state">No sponsorships matched filter</div>`;
  }

  for (const s of list) {
    const amount = s.amount_cents ? (s.amount_cents / 100).toFixed(2) : '0.00';
    const status = s.status || 'pending';
    const name = escHtml(s.sponsor_name) || 'Anonymous';
    const email = escHtml(s.sponsor_email);
    const phone = escHtml(s.sponsor_phone);
    const facility = escHtml(s.facility_name) || 'Unknown facility';
    const message = escHtml(s.message);
    const date = s.created_at ? new Date(s.created_at).toLocaleDateString() : '';

    const address = escHtml(s.facility_address) || 'No Address Stored';
    const city = escHtml(s.facility_city) || '';
    const state = escHtml(s.facility_state) || '';
    const zip = escHtml(s.facility_zip) || '';
    const tracking = escHtml(s.tracking_number) || '';
    const notes = escHtml(s.fulfillment_notes) || '';
    const shippedDate = s.shipped_at ? new Date(s.shipped_at).toLocaleDateString() : '';

    html += `
      <div class="sponsorship-card">
        <div class="card-row">
          <div>
            <span class="card-name">${name}</span>
            <span class="card-email">${email} ${phone ? `| ${phone}` : ''}</span>
            ${s.is_anonymous ? ' 🔒' : ''}
          </div>
          <span class="status-badge ${status}">${status}</span>
        </div>
        <div class="card-details">
          <span>$${amount}</span>
          <span>${s.book_count || 0} books</span>
          <span>Order Date: ${date}</span>
        </div>

        <div class="shipping-label-card">
          <strong>SHIPPING LABEL:</strong><br>
          ${facility}<br>
          ${address}<br>
          ${city}${city && state ? ', ' : ''}${state} ${zip}
        </div>

        ${message ? `<div class="card-message">"${message}"</div>` : ''}
        ${notes ? `<div class="card-message" style="border-left: 3px solid #1e40af; background: #eff6ff; padding: 6px 12px; font-style: normal; margin-top: 10px;"><strong>Fulfillment Note:</strong> "${notes}"</div>` : ''}

        <div class="card-actions">
          ${status === 'paid' ? `
            <div>
              <textarea id="notes-${s.id}" class="notes-input" placeholder="Add fulfillment notes (optional)...">${notes}</textarea>
              <button class="action-btn fulfill" style="margin-top: 8px;" onclick="markFulfilled('${escHtml(s.id)}')">Mark Fulfilled</button>
            </div>
          ` : ''}

          ${status === 'fulfilled' || status === 'paid' ? `
            <div class="tracking-input-row">
              <input id="tracking-${s.id}" class="tracking-input" placeholder="Enter tracking number" value="${tracking}">
              <button class="action-btn fulfill" style="background:#10b981;" onclick="saveTracking('${escHtml(s.id)}')">Ship & Save Tracking</button>
            </div>
          ` : ''}

          ${status === 'shipped' ? `
            <div style="font-size:14px; color:#4b5563; margin-top:8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
              <span><strong>📦 Tracking Number:</strong> <code>${tracking}</code> (Shipped on ${shippedDate})</span>
              <button class="action-btn fulfill" style="background:#6b7280; padding: 2px 8px; font-size:11px;" onclick="editTracking('${escHtml(s.id)}', '${tracking}')">Update Tracking</button>
            </div>
          ` : ''}
        </div>
      </div>
    `;
  }

  return html;
}

function renderRequestsList(list) {
  const pendingRequests = list.filter(r => r.status === 'pending');

  if (!pendingRequests.length) {
    return `
      <input class="search-box" id="search-requests" placeholder="Search by facility or email..." oninput="refreshCurrentTab()">
      <div class="empty-state">No pending facility requests</div>
    `;
  }

  let html = `
    <input class="search-box" id="search-requests" placeholder="Search by facility or email..." oninput="refreshCurrentTab()">
  `;

  for (const r of pendingRequests) {
    const facility = escHtml(r.facility_name);
    const city = escHtml(r.city);
    const state = escHtml(r.state);
    const address = escHtml(r.address);
    const requestorName = escHtml(r.requestor_name);
    const requestorEmail = escHtml(r.requestor_email);
    const notes = escHtml(r.notes);
    const date = r.created_at ? new Date(r.created_at).toLocaleDateString() : '';
    const status = r.status || 'pending';

    html += `
      <div class="sponsorship-card">
        <div class="card-row">
          <div>
            <span class="card-name">${facility}</span>
            ${city ? `, ${city}` : ''} ${state || ''}
          </div>
          <span class="status-badge ${status}">${status}</span>
        </div>
        ${address ? `<div class="card-details">${address}</div>` : ''}
        <div class="card-details">
          ${requestorName ? `Requested by: ${requestorName}` : ''}
          ${requestorEmail ? `(${requestorEmail})` : ''}
          <span>${date}</span>
        </div>
        ${notes ? `<div class="card-message">"${notes}"</div>` : ''}
        <div class="card-actions" style="flex-direction: row; gap: 8px;">
          <button class="action-btn approve" onclick="approveRequest('${escHtml(r.id)}')">✅ Approve</button>
          <button class="action-btn deny" onclick="denyRequest('${escHtml(r.id)}')">❌ Deny</button>
          <button class="action-btn duplicate" onclick="markDuplicate('${escHtml(r.id)}')">📋 Duplicate</button>
        </div>
      </div>
    `;
  }

  return html;
}

async function markFulfilled(id) {
  if (!confirm('Mark this sponsorship as fulfilled?')) return;
  const notes = document.getElementById('notes-' + id).value;
  try {
    const res = await fetch('/api/sponsor/admin', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, action: 'fulfill', notes })
    });
    if (res.ok) {
      checkAuthAndLoad();
    } else {
      alert('Failed to update');
    }
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

async function saveTracking(id) {
  const tracking_number = document.getElementById('tracking-' + id).value.trim();
  if (!tracking_number) {
    alert('Please enter a tracking number');
    return;
  }
  try {
    const res = await fetch('/api/sponsor/admin', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, action: 'ship', tracking_number })
    });
    if (res.ok) {
      checkAuthAndLoad();
    } else {
      alert('Failed to save tracking');
    }
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

function editTracking(id, currentTracking) {
  const tracking_number = prompt('Update tracking number:', currentTracking);
  if (tracking_number === null) return; // cancelled
  if (!tracking_number.trim()) {
    alert('Tracking number cannot be empty');
    return;
  }
  
  fetch('/api/sponsor/admin', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, action: 'ship', tracking_number: tracking_number.trim() })
  }).then(res => {
    if (res.ok) {
      checkAuthAndLoad();
    } else {
      alert('Failed to update tracking');
    }
  }).catch(e => {
    alert('Error: ' + e.message);
  });
}

async function approveRequest(id) {
  if (!confirm('Approve this facility and add it to the database?')) return;
  try {
    const res = await fetch('/api/sponsor/admin-requests', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ request_id: id, action: 'approve' })
    });
    if (res.ok) {
      checkAuthAndLoad();
    } else {
      alert('Failed to approve');
    }
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

async function denyRequest(id) {
  if (!confirm('Deny this facility request?')) return;
  try {
    const res = await fetch('/api/sponsor/admin-requests', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ request_id: id, action: 'deny' })
    });
    if (res.ok) {
      checkAuthAndLoad();
    } else {
      alert('Failed to deny');
    }
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

async function markDuplicate(id) {
  if (!confirm('Mark this as a duplicate request?')) return;
  try {
    const res = await fetch('/api/sponsor/admin-requests', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ request_id: id, action: 'duplicate' })
    });
    if (res.ok) {
      checkAuthAndLoad();
    } else {
      alert('Failed to mark duplicate');
    }
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

function switchTab(tab) {
  currentTab = tab;
  renderDashboard();
}

function refreshCurrentTab() {
  renderDashboard();
}

checkAuthAndLoad();
</script>
