<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sponsorship Admin — White Collar Academy</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e5e5e5;
    }

    .admin-header h1 {
      font-family: Georgia, serif;
      font-size: 28px;
      font-weight: 400;
      color: #1a1a2e;
      margin: 0;
    }

    .admin-header .logout-btn {
      font-size: 14px;
      color: #666;
      text-decoration: underline;
      cursor: pointer;
      background: none;
      border: none;
    }

    .admin-header .logout-btn:hover {
      color: #b91c1c;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-box {
      background: #f8f8f8;
      padding: 16px 20px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid #e5e5e5;
    }

    .stat-box .number {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      font-family: Georgia, serif;
    }

    .stat-box .label {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    .admin-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 1px solid #e5e5e5;
    }

    .admin-tabs button {
      background: none;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-family: Georgia, serif;
      color: #666;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .admin-tabs button:hover {
      color: #1a1a2e;
    }

    .admin-tabs button.active {
      color: #1a1a2e;
      border-bottom-color: #1a1a2e;
    }

    .search-box {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      font-family: Georgia, serif;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      margin-bottom: 20px;
      background: #fff;
      color: #1a1a2e;
      transition: border-color 0.2s;
    }

    .search-box:focus {
      outline: none;
      border-color: #1a1a2e;
    }

    .sponsorship-card {
      background: #fff;
      padding: 16px 20px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #e5e5e5;
      transition: box-shadow 0.2s;
    }

    .sponsorship-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .sponsorship-card .card-row {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      align-items: start;
      gap: 8px;
    }

    .sponsorship-card .card-name {
      font-weight: 600;
      color: #1a1a2e;
      font-family: Georgia, serif;
    }

    .sponsorship-card .card-email {
      color: #666;
      font-size: 14px;
      margin-left: 8px;
    }

    .sponsorship-card .card-details {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 8px;
      font-size: 14px;
      color: #666;
    }

    .sponsorship-card .card-message {
      margin-top: 8px;
      font-style: italic;
      color: #888;
      font-size: 14px;
    }

    .sponsorship-card .card-actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .status-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: capitalize;
    }

    .status-badge.pending { background: #fef3c7; color: #92400e; }
    .status-badge.paid { background: #d1fae5; color: #065f46; }
    .status-badge.fulfilled { background: #dbeafe; color: #1e40af; }
    .status-badge.cancelled { background: #fee2e2; color: #991b1b; }
    .status-badge.approved { background: #d1fae5; color: #065f46; }
    .status-badge.denied { background: #fee2e2; color: #991b1b; }
    .status-badge.duplicate { background: #f3f4f6; color: #4b5563; }

    .action-btn {
      padding: 4px 14px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-family: Georgia, serif;
      transition: opacity 0.2s;
    }

    .action-btn:hover { opacity: 0.8; }
    .action-btn.approve { background: #065f46; color: #fff; }
    .action-btn.deny { background: #991b1b; color: #fff; }
    .action-btn.duplicate { background: #6b7280; color: #fff; }
    .action-btn.fulfill { background: #1e40af; color: #fff; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
      font-family: Georgia, serif;
    }

    .login-container {
      max-width: 400px;
      margin: 80px auto;
      padding: 40px;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e5e5;
      text-align: center;
    }

    .login-container h1 {
      font-family: Georgia, serif;
      font-size: 24px;
      font-weight: 400;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .login-container p {
      color: #666;
      margin-bottom: 24px;
    }

    .login-container input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-family: Georgia, serif;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }

    .login-container input:focus {
      outline: none;
      border-color: #1a1a2e;
    }

    .login-container .btn {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-family: Georgia, serif;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .login-container .btn:hover {
      background: #2a2a3e;
    }

    .login-container .error {
      color: #991b1b;
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="app"></div>

<script>
let currentTab = 'sponsorships';
let allSponsorships = [];
let allRequests = [];

function renderLogin(errorMsg) {
  document.getElementById('app').innerHTML = `
    <div class="login-container">
      <h1>🔐 Admin Login</h1>
      <p>Enter the admin password to continue</p>
      <input type="password" id="admin-password" placeholder="Enter password"
             onkeydown="if(event.key==='Enter') login()">
      <button class="btn" onclick="login()">Login</button>
      <div class="error">${errorMsg || ''}</div>
    </div>
  `;
}

async function login() {
  const password = document.getElementById('admin-password').value;
  try {
    const res = await fetch('/api/sponsor/admin-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    if (res.ok) {
      loadDashboard();
    } else {
      const data = await res.json().catch(() => ({}));
      renderLogin(data.error || 'Invalid password');
    }
  } catch (e) {
    renderLogin('Login failed. Please try again.');
  }
}

async function loadDashboard() {
  try {
    const res = await fetch('/api/sponsor/admin');
    if (res.status === 401) { renderLogin(); return; }
    if (!res.ok) throw new Error('Failed to load');
    const data = await res.json();
    allSponsorships = data.sponsorships || [];

    const reqRes = await fetch('/api/sponsor/admin-requests');
    allRequests = reqRes.ok ? (await reqRes.json()).requests || [] : [];

    renderDashboard(data.stats || {});
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="admin-container">
        <p style="color:#991b1b;">Failed to load dashboard. Please refresh.</p>
      </div>
    `;
  }
}

function escHtml(s) {
  return (s || '').toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderDashboard(stats) {
  const total = stats.total || 0;
  const pending = stats.pending || 0;
  const paid = stats.paid || 0;
  const fulfilled = stats.fulfilled || 0;
  const requestsPending = allRequests.filter(r => r.status === 'pending').length;

  const filteredSponsorships = filterSponsorships(allSponsorships);
  const filteredRequests = filterRequests(allRequests);

  document.getElementById('app').innerHTML = `
    <div class="admin-container">
      <div class="admin-header">
        <h1>📚 Sponsorship Admin</h1>
        <button class="logout-btn" onclick="logout()">Log out</button>
      </div>

      <div class="stats-grid">
        <div class="stat-box"><div class="number">${total}</div><div class="label">Total</div></div>
        <div class="stat-box"><div class="number">${pending}</div><div class="label">Pending</div></div>
        <div class="stat-box"><div class="number">${paid}</div><div class="label">Paid</div></div>
        <div class="stat-box"><div class="number">${fulfilled}</div><div class="label">Fulfilled</div></div>
        <div class="stat-box"><div class="number">${requestsPending}</div><div class="label">Facility Requests</div></div>
      </div>

      <div class="admin-tabs">
        <button class="${currentTab === 'sponsorships' ? 'active' : ''}" onclick="switchTab('sponsorships')">Sponsorships</button>
        <button class="${currentTab === 'requests' ? 'active' : ''}" onclick="switchTab('requests')">Facility Requests</button>
      </div>

      ${currentTab === 'sponsorships'
        ? renderSponsorshipsList(filteredSponsorships)
        : renderRequestsList(filteredRequests)}
    </div>
  `;
}

function filterSponsorships(list) {
  const searchEl = document.getElementById('search-box');
  if (!searchEl) return list;
  const query = searchEl.value.toLowerCase().trim();
  if (!query) return list;
  return list.filter(s => {
    const name = (s.sponsor_name || '').toLowerCase();
    const email = (s.sponsor_email || '').toLowerCase();
    const facility = (s.facility_name || '').toLowerCase();
    return name.includes(query) || email.includes(query) || facility.includes(query);
  });
}

function filterRequests(list) {
  const searchEl = document.getElementById('search-requests');
  if (!searchEl) return list;
  const query = searchEl.value.toLowerCase().trim();
  if (!query) return list;
  return list.filter(r => {
    const name = (r.facility_name || '').toLowerCase();
    const email = (r.requestor_email || '').toLowerCase();
    return name.includes(query) || email.includes(query);
  });
}

function renderSponsorshipsList(list) {
  const search = `<input class="search-box" id="search-box" placeholder="Search by name, email, or facility..." oninput="refreshCurrentTab()">`;
  if (!list.length) return search + `<div class="empty-state">No sponsorships yet</div>`;

  let html = search;
  for (const s of list) {
    const amount = s.amount_cents ? (s.amount_cents / 100).toFixed(2) : '0.00';
    const status = s.status || 'pending';
    html += `
      <div class="sponsorship-card">
        <div class="card-row">
          <div>
            <span class="card-name">${escHtml(s.sponsor_name) || 'Anonymous'}</span>
            <span class="card-email">${escHtml(s.sponsor_email)}</span>
            ${s.is_anonymous ? ' 🔒' : ''}
          </div>
          <span class="status-badge ${status}">${status}</span>
        </div>
        <div class="card-details">
          <span>${escHtml(s.facility_name) || 'Unknown facility'}</span>
          <span>$${amount}</span>
          <span>${s.book_count || 0} books</span>
          <span>${new Date(s.created_at).toLocaleDateString()}</span>
        </div>
        ${s.message ? `<div class="card-message">"${escHtml(s.message)}"</div>` : ''}
        <div class="card-actions">
          ${status === 'paid' ? `<button class="action-btn fulfill" onclick="markFulfilled('${s.id}')">Mark Fulfilled</button>` : ''}
        </div>
      </div>
    `;
  }
  return html;
}

function renderRequestsList(list) {
  const search = `<input class="search-box" id="search-requests" placeholder="Search by facility or email..." oninput="refreshCurrentTab()">`;
  if (!list.length) return search + `<div class="empty-state">No facility requests</div>`;

  let html = search;
  for (const r of list) {
    const status = r.status || 'pending';
    html += `
      <div class="sponsorship-card">
        <div class="card-row">
          <div>
            <span class="card-name">${escHtml(r.facility_name)}</span>
            ${r.city ? `, ${escHtml(r.city)}` : ''} ${escHtml(r.state)}
          </div>
          <span class="status-badge ${status}">${status}</span>
        </div>
        ${r.address ? `<div class="card-details">${escHtml(r.address)}</div>` : ''}
        <div class="card-details">
          ${r.requestor_name ? `Requested by: ${escHtml(r.requestor_name)}` : ''}
          ${r.requestor_email ? `(${escHtml(r.requestor_email)})` : ''}
          <span>${new Date(r.created_at).toLocaleDateString()}</span>
        </div>
        ${r.notes ? `<div class="card-message">"${escHtml(r.notes)}"</div>` : ''}
        <div class="card-actions">
          ${status === 'pending' ? `
            <button class="action-btn approve" onclick="approveRequest('${r.id}')">✅ Approve</button>
            <button class="action-btn deny" onclick="denyRequest('${r.id}')">❌ Deny</button>
            <button class="action-btn duplicate" onclick="markDuplicate('${r.id}')">📋 Duplicate</button>
          ` : ''}
        </div>
      </div>
    `;
  }
  return html;
}

async function markFulfilled(id) {
  if (!confirm('Mark this sponsorship as fulfilled?')) return;
  const res = await fetch('/api/sponsor/admin', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, action: 'fulfill' })
  });
  if (res.ok) loadDashboard(); else alert('Failed to update');
}

async function approveRequest(id) {
  if (!confirm('Approve this facility and add it to the database?')) return;
  const res = await fetch('/api/sponsor/admin-requests', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ request_id: id, action: 'approve' })
  });
  if (res.ok) loadDashboard(); else alert('Failed to approve');
}

async function denyRequest(id) {
  if (!confirm('Deny this facility request?')) return;
  const res = await fetch('/api/sponsor/admin-requests', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ request_id: id, action: 'deny' })
  });
  if (res.ok) loadDashboard(); else alert('Failed to deny');
}

async function markDuplicate(id) {
  if (!confirm('Mark this as a duplicate request?')) return;
  const res = await fetch('/api/sponsor/admin-requests', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ request_id: id, action: 'duplicate' })
  });
  if (res.ok) loadDashboard(); else alert('Failed to mark duplicate');
}

function switchTab(tab) {
  currentTab = tab;
  loadDashboard();
}

function refreshCurrentTab() {
  const total = allSponsorships.length;
  const pending = allSponsorships.filter(s => s.status === 'pending').length;
  const paid = allSponsorships.filter(s => s.status === 'paid').length;
  const fulfilled = allSponsorships.filter(s => s.status === 'fulfilled').length;
  renderDashboard({ total, pending, paid, fulfilled });
}

async function logout() {
  if (!confirm('Log out?')) return;
  await fetch('/api/sponsor/admin-logout', { method: 'POST' });
  renderLogin();
}

loadDashboard();
</script>

</body>
</html>
