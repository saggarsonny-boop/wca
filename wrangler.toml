# Cloudflare Pages configuration
# https://developers.cloudflare.com/pages/functions/wrangler-configuration/
#
# SETUP:
# 1. Install wrangler: npm install -g wrangler
# 2. Authenticate:     npx wrangler login
# 3. Create D1 db:     npx wrangler d1 create newphysician-subscribers
# 4. Copy the database_id output into the [[d1_databases]] block below.
# 5. Create the table: see comments in functions/api/subscribe.js
# 6. Deploy via Cloudflare Pages dashboard (connect your GitHub repo).

name = "newphysician"
pages_build_output_dir = "."
compatibility_date = "2024-01-01"

[[d1_databases]]
binding     = "DB"
database_name = "newphysician-subscribers"
database_id   = "PLACEHOLDER-replace-with-your-d1-database-id"
# Get this ID after running: npx wrangler d1 create newphysician-subscribers

# Optional: environment variables (set sensitive values in the
# Cloudflare Pages dashboard, NOT here)
#
# [vars]
# EMAIL_LIST_ID = "your-list-id"   # non-secret; can live here
#
# Secrets (API keys) must be set in:
#   Cloudflare dashboard → Pages → newphysician → Settings → Environment variables
#   Variable name: EMAIL_PROVIDER_API_KEY
