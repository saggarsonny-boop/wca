# Cloudflare Pages configuration
# https://developers.cloudflare.com/pages/functions/wrangler-configuration/
#
# SETUP — Public site:
# 1. Install wrangler: npm install -g wrangler
# 2. Authenticate:     npx wrangler login
# 3. D1 database already created: wca-subscribers (f9e924d6-3547-4ba4-ac8d-005e95d36628)
# 4. Run organiser schema: npx wrangler d1 execute wca-subscribers --file=_schema_organiser.sql
# 5. Create R2 bucket: npx wrangler r2 bucket create wca-documents
# 6. Set secrets in Cloudflare Pages dashboard (see below)
# 7. Deploy via Cloudflare Pages dashboard (GitHub repo: saggarsonny-boop/wca)

name = "whitecollaracademy"
pages_build_output_dir = "."
compatibility_date = "2024-01-01"

[[d1_databases]]
binding       = "DB"
database_name = "wca-subscribers"
database_id   = "f9e924d6-3547-4ba4-ac8d-005e95d36628"

# R2 bucket for document storage — uncomment after creating the bucket:
#   npx wrangler r2 bucket create wca-documents
# [[r2_buckets]]
# binding     = "DOCUMENTS"
# bucket_name = "wca-documents"

# ── Secrets — set ALL of these in Cloudflare Pages dashboard ──────────────────
# Pages → whitecollaracademy → Settings → Environment variables
#
# Public site:
#   BEEHIIV_API_KEY          Beehiiv API key
#   BEEHIIV_PUBLICATION_ID   pub_8a8a6dce-c503-4726-9188-df1220e280d7
#
# Case Organiser:
#   JWT_SECRET               Random 64-char string (openssl rand -hex 32)
#   ENCRYPTION_KEY           Base64-encoded 32-byte key (openssl rand -base64 32)
#   ANTHROPIC_API_KEY        Claude API key
#   STRIPE_SECRET_KEY        Stripe secret key (sk_live_...)
#   STRIPE_WEBHOOK_SECRET    Stripe webhook signing secret (whsec_...)
#   STRIPE_PRICE_ID_MONTHLY  Stripe Price ID for $49/month plan
#   STRIPE_PRICE_ID_LIFETIME Stripe Price ID for $497 one-time plan
