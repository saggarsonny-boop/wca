# Cloudflare Pages configuration
# https://developers.cloudflare.com/pages/functions/wrangler-configuration/
#
# SETUP — Public site:
# 1. Install wrangler: npm install -g wrangler
# 2. Authenticate:     npx wrangler login
# 3. D1 database already created: wca-subscribers (f9e924d6-3547-4ba4-ac8d-005e95d36628)
# 4. Run organiser schema: npx wrangler d1 execute wca-subscribers --file=_schema_organiser.sql
# 5. Run sponsor schema:   npx wrangler d1 execute wca-subscribers --file=_schema_sponsor.sql
#    Then seed real facility rows before enabling /sponsor.html publicly —
#    see the header comment in _schema_sponsor.sql.
# 6. Create R2 bucket: npx wrangler r2 bucket create wca-documents
# 7. Set secrets in Cloudflare Pages dashboard (see below)
# 8. Deploy via Cloudflare Pages dashboard (GitHub repo: saggarsonny-boop/wca)

name = "whitecollaracademy"
pages_build_output_dir = "."
compatibility_date = "2024-01-01"

[[d1_databases]]
binding       = "DB"
database_name = "wca-subscribers"
database_id   = "f9e924d6-3547-4ba4-ac8d-005e95d36628"

[vars]
STRIPE_PRICE_ID_MONTHLY = "price_1TnWjLPIZtoQZOG1UvF3o6l7"
STRIPE_PRICE_ID_LIFETIME = "price_1TnWjMPIZtoQZOG1oJxDdoml"
STRIPE_PRICE_ID_ATTORNEY = "price_1TnrW3PIZtoQZOG13qoIxrSt"
STRIPE_PRICE_ID_CONSULTING = "price_1Tum6SPIZtoQZOG1I2dhwrdi"
STRIPE_PRICE_ID_SINGLE_PAPERBACK = "price_1Tp6rzPIZtoQZOG1K4B9laAs"
STRIPE_PRICE_ID_SMALL_SET_PAPERBACK = "price_1Tp6s0PIZtoQZOG1eXKofXTb"
STRIPE_PRICE_ID_LIBRARY_SET_PAPERBACK = "price_1Tp6s1PIZtoQZOG1IyhGQcMo"
STRIPE_PRICE_ID_FULL_LIBRARY_PAPERBACK = "price_1Tp6s1PIZtoQZOG1zhoU7vtL"
STRIPE_PRICE_ID_SINGLE_HARDCOVER = "price_1Tp6s2PIZtoQZOG1NuFfs6Sz"
STRIPE_PRICE_ID_SMALL_SET_HARDCOVER = "price_1Tp6s2PIZtoQZOG1N6Mc6p4l"
STRIPE_PRICE_ID_LIBRARY_SET_HARDCOVER = "price_1Tp6s2PIZtoQZOG1tEb3nLOZ"
STRIPE_PRICE_ID_FULL_LIBRARY_HARDCOVER = "price_1Tp6s3PIZtoQZOG1eCcN3zBs"


# R2 bucket for document storage
[[r2_buckets]]
binding     = "DOCUMENTS"
bucket_name = "wca-documents"

# ── Secrets — set ALL of these in Cloudflare Pages dashboard ──────────────────
# Pages → whitecollaracademy → Settings → Environment variables
#
# Public site:
#   BEEHIIV_API_KEY          Beehiiv API key
#   BEEHIIV_PUBLICATION_ID   pub_8a8a6dce-c503-4726-9188-df1220e280d7
#
# Case Organiser:
#   JWT_SECRET               Random 64-char string (openssl rand -hex 32)
#   ENCRYPTION_KEY           Base64-encoded 32-byte key (openssl rand -base64 32)
#   ANTHROPIC_API_KEY        Claude API key
#   STRIPE_SECRET_KEY        Stripe secret key (sk_live_...)
#   STRIPE_WEBHOOK_SECRET    Stripe webhook signing secret (whsec_...)
#   STRIPE_PRICE_ID_MONTHLY  Stripe Price ID for $49/month plan
#   STRIPE_PRICE_ID_LIFETIME Stripe Price ID for $497 one-time plan
#
# Road Sponsorship Program (reuses STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET above):
#   SPONSOR_ADMIN_PASSWORD   Password for /sponsor-admin.html — separate from
#                            organiser customer accounts, do not reuse a
#                            customer-facing password for this
