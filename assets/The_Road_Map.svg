<svg xmlns="http://www.w3.org/2000/svg" width="700" height="1300" viewBox="0 0 700 1300" font-family="Georgia, 'Times New Roman', serif">
<rect x="0" y="0" width="700" height="1300" fill="#ffffff"/>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="350" y="48" text-anchor="middle" font-size="26" font-weight="bold" fill="#1a1a1a">The Road</text>
<text x="350" y="74" text-anchor="middle" font-size="14" font-style="italic" fill="#666">The path most people walk, start to finish. You are somewhere on it now.</text>

<!-- helper styles via attributes -->
<!-- NEUTRAL boxes -->
<rect x="240" y="92" width="220" height="50" rx="9" fill="#F1EFE8" stroke="#888780" stroke-width="1"/><text x="350.0" y="111.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A">Investigation</text><text x="350.0" y="130.0" text-anchor="middle" font-size="12.5" fill="#888780">Months to years. Often unseen.</text>
<line x1="350" y1="142" x2="350" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="240" y="170" width="220" height="50" rx="9" fill="#F1EFE8" stroke="#888780" stroke-width="1"/><text x="350.0" y="189.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A">Indictment</text><text x="350.0" y="208.0" text-anchor="middle" font-size="12.5" fill="#888780">The charges become formal</text>
<line x1="350" y1="220" x2="350" y2="248" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="240" y="248" width="220" height="56" rx="9" fill="#F1EFE8" stroke="#888780" stroke-width="1"/><text x="350.0" y="270.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A">Evidence and back-and-forth</text><text x="350.0" y="289.0" text-anchor="middle" font-size="12.5" fill="#888780">Discovery and motions. Often slow.</text>
<line x1="350" y1="304" x2="350" y2="332" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="258" y="332" width="184" height="42" rx="9" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/><text x="350.0" y="358.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#633806">Fork 1: Trial or plea</text>
<line x1="300" y1="374" x2="200" y2="412" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="400" y1="374" x2="500" y2="412" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="58" y="412" width="200" height="56" rx="9" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/><text x="158.0" y="434.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#712B13">Trial</text><text x="158.0" y="453.0" text-anchor="middle" font-size="12.5" fill="#D85A30">A small share of cases. Risky.</text>
<rect x="442" y="412" width="200" height="56" rx="9" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/><text x="542.0" y="434.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#085041">Plea</text><text x="542.0" y="453.0" text-anchor="middle" font-size="12.5" fill="#1D9E75">The path most people take</text>
<line x1="108" y1="468" x2="78" y2="500" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="208" y1="468" x2="238" y2="500" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="38" y="500" width="150" height="56" rx="9" fill="#EAF3DE" stroke="#639922" stroke-width="1"/><text x="113.0" y="522.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#173404">Acquitted</text><text x="113.0" y="541.0" text-anchor="middle" font-size="12.5" fill="#639922">Free. It happens.</text>
<rect x="208" y="500" width="150" height="56" rx="9" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/><text x="283.0" y="522.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#712B13">Convicted</text><text x="283.0" y="541.0" text-anchor="middle" font-size="12.5" fill="#D85A30">Rejoins the road</text>
<line x1="283" y1="556" x2="283" y2="580" stroke="#999" stroke-width="1" stroke-dasharray="3 3"/>
<line x1="283" y1="580" x2="345" y2="580" stroke="#999" stroke-width="1" stroke-dasharray="3 3"/>
<line x1="542" y1="468" x2="542" y2="580" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="542" y1="580" x2="355" y2="580" stroke="#999" stroke-width="1" stroke-dasharray="3 3"/>
<rect x="240" y="584" width="220" height="56" rx="9" fill="#F1EFE8" stroke="#888780" stroke-width="1"/><text x="350.0" y="606.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A">Presentence interview</text><text x="350.0" y="625.0" text-anchor="middle" font-size="12.5" fill="#888780">In person or video. Lawyer attends.</text>
<line x1="350" y1="640" x2="350" y2="668" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="240" y="668" width="220" height="42" rx="9" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/><text x="350.0" y="694.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#633806">Fork 2: Bond or custody</text>
<line x1="300" y1="710" x2="210" y2="748" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="400" y1="710" x2="490" y2="748" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="70" y="748" width="200" height="56" rx="9" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/><text x="170.0" y="770.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#0C447C">Wait at home on bond</text><text x="170.0" y="789.0" text-anchor="middle" font-size="12.5" fill="#378ADD">Then self-surrender later</text>
<rect x="430" y="748" width="200" height="56" rx="9" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/><text x="530.0" y="770.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#0C447C">Held in custody</text><text x="530.0" y="789.0" text-anchor="middle" font-size="12.5" fill="#378ADD">If held before sentencing</text>
<line x1="170" y1="804" x2="170" y2="834" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="530" y1="804" x2="530" y2="834" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="170" y1="834" x2="345" y2="834" stroke="#999" stroke-width="1" stroke-dasharray="3 3"/>
<line x1="530" y1="834" x2="355" y2="834" stroke="#999" stroke-width="1" stroke-dasharray="3 3"/>
<rect x="240" y="838" width="220" height="44" rx="9" fill="#F1EFE8" stroke="#888780" stroke-width="1"/><text x="350.0" y="865.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A">Sentencing</text>
<line x1="350" y1="882" x2="350" y2="910" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="240" y="910" width="220" height="50" rx="9" fill="#F1EFE8" stroke="#888780" stroke-width="1"/><text x="350.0" y="929.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A">Designation and transfer</text><text x="350.0" y="948.0" text-anchor="middle" font-size="12.5" fill="#888780">Where you will go</text>
<line x1="350" y1="960" x2="350" y2="988" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="240" y="988" width="220" height="50" rx="9" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/><text x="350.0" y="1007.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#26215C">Life on the inside</text><text x="350.0" y="1026.0" text-anchor="middle" font-size="12.5" fill="#7F77DD">Its own world, its own time</text>
<line x1="350" y1="1038" x2="350" y2="1066" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="240" y="1066" width="220" height="56" rx="9" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/><text x="350.0" y="1088.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#26215C">Pre-release</text><text x="350.0" y="1107.0" text-anchor="middle" font-size="12.5" fill="#7F77DD">RRC and home confinement (2CA)</text>
<line x1="350" y1="1122" x2="350" y2="1150" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="240" y="1150" width="220" height="50" rx="9" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/><text x="350.0" y="1169.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#26215C">Supervised release</text><text x="350.0" y="1188.0" text-anchor="middle" font-size="12.5" fill="#7F77DD">States may call it parole</text>
<line x1="350" y1="1200" x2="350" y2="1228" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="240" y="1228" width="220" height="50" rx="9" fill="#EAF3DE" stroke="#639922" stroke-width="1"/><text x="350.0" y="1247.0" text-anchor="middle" font-size="15" font-weight="bold" fill="#173404">The life after</text><text x="350.0" y="1266.0" text-anchor="middle" font-size="12.5" fill="#639922">You are still standing</text>
<text x="350" y="1295" text-anchor="middle" font-size="11" fill="#999">newphysician.org</text>
</svg>