<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/theme.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Study Vault — WCA</title>
  <meta name="description" content="Anonymized case studies and sentencing mitigation outcomes.">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/organiser.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="/" class="site-logo"><svg width="28" height="28" viewBox="0 0 64 64" style="vertical-align:middle;margin-right:0.4rem;border-radius:5px;" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="64" rx="8" fill="#2c4a7c"/><text x="32" y="44" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="1">WCA</text></svg>White Collar Academy</a>
  </div>
</header>

<div class="org-layout">
  <main id="main-content" class="org-main" style="max-width:800px; margin:0 auto; padding:2rem 1rem;">
    <h1>Case Study Vault</h1>
    <p class="text-soft" style="margin-bottom:2rem;">Vetted, anonymized case studies demonstrating clinical mitigation outcomes and sentencing guideline adjustments.</p>

    <!-- CONTAINER FOR DYNAMIC CASE STUDIES -->
    <div id="cases-container">Loading case studies...</div>

    <div style="margin-top:2rem;">
      <a href="/organiser/resources.html" class="btn">Back to Resources</a>
    </div>
  </main>
</div>

<script>
  async function loadCaseStudies() {
    try {
      const res = await fetch("/data/case_studies.json");
      if (!res.ok) throw new Error("Failed to load case studies");
      const cases = await res.json();
      
      const container = document.getElementById("cases-container");
      container.innerHTML = "";
      
      const schemas = [];

      cases.forEach(c => {
        // Render card
        const card = document.createElement("article");
        card.style.cssText = "background:#fff; border:1px solid var(--border); padding:1.5rem; border-radius:8px; margin-bottom:1.5rem;";
        card.innerHTML = `
          <h2 style="font-size:1.2rem; color:var(--accent);">${c.title}</h2>
          <p style="margin-top:0.5rem; font-size:0.95rem; line-height:1.6;">
            <strong>Charge:</strong> ${c.charge}<br>
            <strong>Problem:</strong> ${c.problem}<br>
            <strong>Mitigation Strategy:</strong> ${c.solution}<br>
            <strong>Outcome:</strong> ${c.outcome}<br>
            <span style="font-size:0.8rem; background:var(--bg-alt); padding:2px 6px; border-radius:4px; margin-top:8px; display:inline-block;">🏷️ ${c.jurisdiction} | ${c.offense_type}</span>
          </p>
        `;
        container.appendChild(card);

        // Build CaseStudy Schema
        schemas.push({
          "@context": "https://schema.org",
          "@type": "CaseStudy",
          "name": c.title,
          "description": c.problem,
          "about": {
            "@type": "AdministrativeArea",
            "name": c.jurisdiction
          }
        });
      });

      // Inject JSON-LD
      const script = document.createElement("script");
      script.type = "application/ld+json";
      script.text = JSON.stringify({
        "@context": "https://schema.org",
        "@graph": schemas
      });
      document.head.appendChild(script);

    } catch (err) {
      console.error(err);
      document.getElementById("cases-container").innerText = "Failed to load case studies.";
    }
  }
  
  loadCaseStudies();
</script>

</body>
</html>
