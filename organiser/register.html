<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — WCA Case Organiser</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/organiser.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="/" class="site-logo"><svg width="28" height="28" viewBox="0 0 64 64" style="vertical-align:middle;margin-right:0.4rem;border-radius:5px;" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="64" rx="8" fill="#2c4a7c"/><text x="32" y="44" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="1">WCA</text></svg>White Collar Academy</a>
  </div>
</header>

<main>
  <div class="auth-wrap">
    <div class="auth-box">
      <h1>Create account</h1>
      <p class="auth-sub">Start your 7-day free trial. No card required to register.</p>

      <form id="register-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="password">Password <span style="font-weight:normal;font-size:0.8em;">(at least 8 characters)</span></label>
          <input type="password" id="password" name="password" autocomplete="new-password" required minlength="8">
        </div>
        <div style="display:none !important;" aria-hidden="true">
          <input type="text" name="phone_confirm" tabindex="-1" autocomplete="off">
        </div>
        <button type="submit" class="btn btn-full">Create account</button>
        <div id="auth-status" class="auth-status" role="alert" aria-live="polite"></div>
      </form>

      <p class="auth-switch">
        Already have an account? <a href="/organiser/login.html">Sign in</a>
      </p>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <span>© <span id="yr"></span> White Collar Academy. General information only. Not legal advice.</span>
  </div>
</footer>

<script>document.getElementById("yr").textContent = new Date().getFullYear();</script>
<script>
(function () {
  const form = document.getElementById("register-form");
  const status = document.getElementById("auth-status");
  const btn = form.querySelector("button[type=submit]");
  if (!btn) return;

  // Convert button dynamically
  if (!btn.querySelector(".btn-hold__text")) {
    btn.innerHTML = `<span class="btn-hold__progress"></span><span class="btn-hold__text">Press & hold to register</span>`;
  }
  btn.classList.add("btn-hold");

  let holdTimer = null;
  let holdSuccess = false;

  function startHold(e) {
    if (holdSuccess || btn.disabled) return;
    btn.classList.add("holding");
    holdTimer = setTimeout(() => {
      holdSuccess = true;
      btn.classList.remove("holding");
      btn.classList.add("success");
      btn.querySelector(".btn-hold__text").textContent = "Verified";
      
      // Dispatch submit event to trigger form handler
      form.dispatchEvent(new Event("submit"));
    }, 1500);
  }

  function cancelHold() {
    if (holdSuccess) return;
    clearTimeout(holdTimer);
    btn.classList.remove("holding");
  }

  btn.addEventListener("mousedown", startHold);
  btn.addEventListener("touchstart", startHold);
  btn.addEventListener("mouseup", cancelHold);
  btn.addEventListener("mouseleave", cancelHold);
  btn.addEventListener("touchend", cancelHold);

  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    if (!holdSuccess) {
      status.textContent = "Please press and hold the button to submit.";
      status.className = "auth-status auth-status--err";
      return;
    }

    status.textContent = "";
    status.className = "auth-status";
    btn.disabled = true;
    btn.querySelector(".btn-hold__text").textContent = "Creating account...";

    try {
      const resp = await fetch("/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: form.email.value.trim(),
          password: form.password.value,
          phone_confirm: form.phone_confirm.value
        })
      });
      const data = await resp.json();
      if (resp.ok) {
        window.location.href = "/organiser/subscribe.html";
      } else {
        status.textContent = data.error || "Registration failed. Please try again.";
        status.className = "auth-status auth-status--err";
        resetBtn();
      }
    } catch {
      status.textContent = "Network error. Please try again.";
      status.className = "auth-status auth-status--err";
      resetBtn();
    }
  });

  function resetBtn() {
    holdSuccess = false;
    btn.disabled = false;
    btn.classList.remove("success");
    btn.querySelector(".btn-hold__text").textContent = "Press & hold to register";
  }
})();
</script>

<script src="/js/wca-translate.js"></script>
</body>
</html>
