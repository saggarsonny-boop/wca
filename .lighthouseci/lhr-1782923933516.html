ndex":"73","line":"      \u003ca href=\"/road.html\">The Road\u003c/a>","message":"Syntax not understood"},{"index":"74","line":"      \u003ca href=\"/attorneys.html\">Law Firms\u003c/a>","message":"Syntax not understood"},{"index":"75","line":"      \u003ca href=\"/about.html\">About\u003c/a>","message":"Syntax not understood"},{"index":"76","line":"      \u003ca href=\"/chapters.html\">Free Chapters\u003c/a>","message":"Syntax not understood"},{"index":"77","line":"      \u003ca href=\"/writing.html\">Writing\u003c/a>","message":"Syntax not understood"},{"index":"78","line":"      \u003ca href=\"/course.html\">The Course\u003c/a>","message":"Syntax not understood"},{"index":"79","line":"      \u003ca href=\"/organiser/login.html\">Case Organiser\u003c/a>","message":"Syntax not understood"},{"index":"80","line":"    \u003c/nav>","message":"Syntax not understood"},{"index":"81","line":"  \u003c/div>","message":"Syntax not understood"},{"index":"82","line":"\u003c/header>","message":"Syntax not understood"},{"index":"84","line":"\u003cmain>","message":"Syntax not understood"},{"index":"86","line":"  \u003c!-- ── HERO ──────────────────────────────────────────────────── -->","message":"Syntax not understood"},{"index":"87","line":"  \u003csection class=\"hero\">","message":"Syntax not understood"},{"index":"88","line":"    \u003cdiv class=\"container\">","message":"Syntax not understood"},{"index":"89","line":"      \u003cdiv class=\"hero__layout\">","message":"Syntax not understood"},{"index":"91","line":"        \u003cdiv class=\"hero__text\">","message":"Syntax not understood"},{"index":"92","line":"          \u003cspan class=\"eyebrow\" style=\"font-size:0.85rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--accent); font-weight:600; display:block; margin-bottom:0.75rem;\">Sonny Saggar MD\u003c/span>","message":"Unknown directive"},{"index":"93","line":"          \u003ch1 style=\"font-size:clamp(2rem, 5vw, 2.75rem); line-height:1.2; font-weight:600; margin-bottom:1.5rem; font-family:var(--font-serif); color:var(--text);\">The Map I Wish Someone Had Handed Me.\u003c/h1>","message":"Unknown directive"},{"index":"95","line":"          \u003cp class=\"lead\" style=\"font-size:1.15rem; line-height:1.6; color:var(--text-soft); margin-bottom:1.5rem;\">Most of what you will find about the criminal process comes from two places. Lawyers, who handle your case and then close the file. And people who went through it themselves and now tell you to stay strong. Both have their place. Neither is quite this.\u003c/p>","message":"Unknown directive"},{"index":"97","line":"          \u003cp>I am a physician. I spent twenty-five years in emergency medicine, trained at Oxford and at Barts in London, and I built a career on reading complex systems under pressure and explaining them plainly to frightened people. Then I went through the federal system myself. Not as an observer. All the way through.\u003c/p>","message":"Syntax not understood"},{"index":"99","line":"          \u003cp>So I can do something the lawyer often will not and the fellow traveler often cannot. I can show you the actual machinery: the presentence report, the sentencing math, the licensing board, the exclusion, and the databases that outlast the sentence. I explain it the way a doctor explains a diagnosis: clearly, without panic, and without false comfort. The mechanics, named, so the fear stops being a fog and becomes a road you can see.\u003c/p>","message":"Unknown directive"},{"index":"101","line":"          \u003cp>And I can show you the part almost no one explains, because almost no one who explains these things has lived it. For a licensed professional, the court is not the end. It is the first of many. A chain of bodies act, one after another, none of them looking at the total. I lived that stack. I studied it. I write about it. And I made this so that you, or the person you love who is going through it, does not have to walk it blind.\u003c/p>","message":"Syntax not understood"},{"index":"103","line":"          \u003cp style=\"margin-bottom:2rem;\">This is not legal advice, and it is not a promise about your case. It is the map I wish someone had handed me.\u003c/p>","message":"Unknown directive"},{"index":"105","line":"          \u003ca href=\"#signup\" class=\"btn\" style=\"margin-top:0.5rem; display:inline-block;\">Get a chapter from Ground\u003c/a>","message":"Syntax not understood"},{"index":"106","line":"          \u003ca href=\"/organiser/login.html\" class=\"btn btn--outline\" style=\"margin-top:0.5rem; margin-left:0.75rem; display:inline-block;\">Case Organiser\u003c/a>","message":"Unknown directive"},{"index":"107","line":"        \u003c/div>","message":"Syntax not understood"},{"index":"109","line":"        \u003cdiv class=\"hero__portrait\">","message":"Syntax not understood"},{"index":"110","line":"          \u003cimg src=\"/assets/portrait.jpg\" alt=\"Sonny Saggar\" class=\"portrait\">","message":"Syntax not understood"},{"index":"111","line":"        \u003c/div>","message":"Syntax not understood"},{"index":"113","line":"      \u003c/div>","message":"Syntax not understood"},{"index":"114","line":"    \u003c/div>","message":"Syntax not understood"},{"index":"115","line":"  \u003c/section>","message":"Syntax not understood"},{"index":"117","line":"  \u003c!-- ── FREE INTRO VIDEO ──────────────────────────────────────── -->","message":"Syntax not understood"},{"index":"118","line":"  \u003c!-- VIDEO FLAG: section hidden until YouTube ID is ready.","message":"Unknown directive"},{"index":"119","line":"       To enable: remove the style=\"display:none\" attribute below.","message":"Unknown directive"},{"index":"120","line":"       Then replace the placeholder div inside .video-wrap with the iframe embed.","message":"Syntax not understood"},{"index":"121","line":"       See CLAUDE.md for instructions. -->","message":"Syntax not understood"},{"index":"122","line":"  \u003csection class=\"section\" id=\"free- con-margin-left: 2px;\n  --score-icon-size: 10px;\n  --section-padding-vertical: 8px;\n}\n\n.lh-devtools.lh-root {\n  height: 100%;\n}\n.lh-devtools.lh-root img {\n  /* Override devtools default \'min-width: 0\' so svg without size in a flexbox isn\'t collapsed. */\n  min-width: auto;\n}\n.lh-devtools .lh-container {\n  overflow-y: scroll;\n  height: calc(100% - var(--topbar-height));\n}\n@media print {\n  .lh-devtools .lh-container {\n    overflow: unset;\n  }\n}\n.lh-devtools .lh-sticky-header {\n  /* This is normally the height of the topbar, but we want it to stick to the top of our scroll container .lh-container` */\n  top: 0;\n}\n\n@keyframes fadeIn {\n  0% { opacity: 0;}\n  100% { opacity: 0.6;}\n}\n\n.lh-root *, .lh-root *::before, .lh-root *::after {\n  box-sizing: border-box;\n}\n\n.lh-root {\n  font-family: var(--report-font-family);\n  font-size: var(--report-font-size);\n  margin: 0;\n  line-height: var(--report-line-height);\n  background: var(--report-background-color);\n  color: var(--report-text-color);\n}\n\n.lh-root :focus {\n    outline: -webkit-focus-ring-color auto 3px;\n}\n.lh-root summary:focus {\n    outline: none;\n    box-shadow: 0 0 0 1px hsl(217, 89%, 61%);\n}\n\n.lh-root [hidden] {\n  display: none !important;\n}\n\n.lh-root pre {\n  margin: 0;\n}\n\n.lh-root details > summary {\n  cursor: pointer;\n}\n\n.lh-hidden {\n  display: none !important;\n}\n\n.lh-container {\n  /*\n  Text wrapping in the report is so much FUN!\n  We have a `word-break: break-word;` globally here to prevent a few common scenarios, namely\n  long non-breakable text (usually URLs) found in:\n    1. The footer\n    2. .lh-node (outerHTML)\n    3. .lh-code\n\n  With that sorted, the next challenge is appropriate column sizing and text wrapping inside our\n  .lh-details tables. Even more fun.\n    * We don\'t want table headers ("Potential Savings (ms)") to wrap or their column values, but\n    we\'d be happy for the URL column to wrap if the URLs are particularly long.\n    * We want the narrow columns to remain narrow, providing the most column width for URL\n    * We don\'t want the table to extend past 100% width.\n    * Long URLs in the URL column can wrap. Util.getURLDisplayName maxes them out at 64 characters,\n      but they do not get any overflow:ellipsis treatment.\n  */\n  word-break: break-word;\n}\n\n.lh-audit-group a,\n.lh-category-header__description a,\n.lh-audit__description a,\n.lh-warnings a,\n.lh-footer a,\n.lh-table-column--link a {\n  color: var(--link-color);\n}\n\n.lh-audit__description, .lh-audit__stackpack {\n  --inner-audit-padding-right: var(--stackpack-padding-horizontal);\n  padding-left: var(--audit-description-padding-left);\n  padding-right: var(--inner-audit-padding-right);\n  padding-top: 8px;\n  padding-bottom: 8px;\n}\n\n.lh-details {\n  margin-top: var(--default-padding);\n  margin-bottom: var(--default-padding);\n  margin-left: var(--audit-description-padding-left);\n  /* whatever the .lh-details side margins are */\n  width: 100%;\n}\n\n.lh-audit__stackpack {\n  display: flex;\n  align-items: center;\n}\n\n.lh-audit__stackpack__img {\n  max-width: 30px;\n  margin-right: var(--default-padding)\n}\n\n/* Report header */\n\n.lh-report-icon {\n  display: flex;\n  align-items: center;\n  padding: 10px 12px;\n  cursor: pointer;\n}\n.lh-report-icon[disabled] {\n  opacity: 0.3;\n  pointer-events: none;\n}\n\n.lh-report-icon::before {\n  content: "";\n  margin: 4px;\n  background-repeat: no-repeat;\n  width: var(--report-icon-size);\n  height: var(--report-icon-size);\n  opacity: 0.7;\n  display: inline-block;\n  vertical-align: middle;\n}\n.lh-report-icon:hover::before {\n  opacity: 1;\n}\n.lh-dark .lh-report-icon::before {\n  filter: invert(1);\n}\n.lh-report-icon--print::before {\n  background-image: url(\'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h olor-average-secondary);\n}\n.lh-audit--average .lh-audit__score-icon,\n.lh-scorescale-range--average::before {\n  background: var(--color-average);\n  width: var(--icon-square-size);\n  height: var(--icon-square-size);\n}\n\n.lh-audit--fail .lh-audit__display-text {\n  color: var(--color-fail-secondary);\n}\n.lh-audit--fail .lh-audit__score-icon,\n.lh-audit--error .lh-audit__score-icon,\n.lh-scorescale-range--fail::before {\n  border-left: calc(var(--score-icon-size) / 2) solid transparent;\n  border-right: calc(var(--score-icon-size) / 2) solid transparent;\n  border-bottom: var(--score-icon-size) solid var(--color-fail);\n}\n\n.lh-audit--manual .lh-audit__display-text,\n.lh-audit--notapplicable .lh-audit__display-text {\n  color: var(--color-gray-600);\n}\n.lh-audit--manual .lh-audit__score-icon,\n.lh-audit--notapplicable .lh-audit__score-icon {\n  border: calc(0.2 * var(--score-icon-size)) solid var(--color-gray-400);\n  border-radius: 100%;\n  background: none;\n}\n\n.lh-audit--informative .lh-audit__display-text {\n  color: var(--color-gray-600);\n}\n\n.lh-audit--informative .lh-audit__score-icon {\n  border: calc(0.2 * var(--score-icon-size)) solid var(--color-gray-400);\n  border-radius: 100%;\n}\n\n.lh-audit__description,\n.lh-audit__stackpack {\n  color: var(--report-text-color-secondary);\n}\n.lh-audit__adorn {\n  border: 1px solid slategray;\n  border-radius: 3px;\n  margin: 0 3px;\n  padding: 0 2px;\n  line-height: 1.1;\n  display: inline-block;\n  font-size: 90%;\n}\n\n.lh-category-header__description  {\n  text-align: center;\n  color: var(--color-gray-700);\n  margin: 0px auto;\n  max-width: 400px;\n}\n\n\n.lh-audit__display-text,\n.lh-load-opportunity__sparkline,\n.lh-chevron-container {\n  margin: 0 var(--audit-margin-horizontal);\n}\n.lh-chevron-container {\n  margin-right: 0;\n}\n\n.lh-audit__title-and-text {\n  flex: 1;\n}\n\n.lh-audit__title-and-text code {\n  color: var(--snippet-color);\n  font-size: var(--report-monospace-font-size);\n}\n\n/* Prepend display text with em dash separator. But not in Opportunities. */\n.lh-audit__display-text:not(:empty):before {\n  content: \'—\';\n  margin-right: var(--audit-margin-horizontal);\n}\n.lh-audit-group.lh-audit-group--load-opportunities .lh-audit__display-text:not(:empty):before {\n  display: none;\n}\n\n/* Expandable Details (Audit Groups, Audits) */\n.lh-audit__header {\n  display: flex;\n  align-items: center;\n  padding: var(--default-padding);\n}\n\n.lh-audit--load-opportunity .lh-audit__header {\n  display: block;\n}\n\n\n.lh-metricfilter {\n  display: grid;\n  justify-content: end;\n  align-items: center;\n  grid-auto-flow: column;\n  gap: 4px;\n  color: var(--color-gray-700);\n}\n\n.lh-metricfilter__radio {\n  position: absolute;\n  left: -9999px;\n}\n.lh-metricfilter input[type=\'radio\']:focus-visible + label {\n  outline: -webkit-focus-ring-color auto 1px;\n}\n\n.lh-metricfilter__label {\n  display: inline-flex;\n  padding: 0 4px;\n  height: 16px;\n  text-decoration: underline;\n  align-items: center;\n  cursor: pointer;\n  font-size: 90%;\n}\n\n.lh-metricfilter__label--active {\n  background: var(--color-blue-primary);\n  color: var(--color-white);\n  border-radius: 3px;\n  text-decoration: none;\n}\n/* Give the \'All\' choice a more muted display */\n.lh-metricfilter__label--active[for="metric-All"] {\n  background-color: var(--color-blue-200) !important;\n  color: black !important;\n}\n\n.lh-metricfilter__text {\n  margin-right: 8px;\n}\n\n/* If audits are filtered, hide the itemcount for Passed Audits… */\n.lh-category--filtered .lh-audit-group .lh-audit-group__itemcount {\n  display: none;\n}\n\n\n.lh-audit__header:hover {\n  background-color: var(--color-hover);\n}\n\n/* We want to hide the browser\'s default arrow marker on summary elements. Admittedly, it\'s complicated. */\n.lh-root details > summary {\n  /* Blink 89+ and Firefox will hide the arrow when display is changed from (new) default of `list-item` to block.  https://chromestatus.
